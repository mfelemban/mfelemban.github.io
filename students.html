---
layout: default
title: Students
permalink: /students/
---

{% for group in site.data.students.groups %}
  <h2>{{ group.title }}</h2>
  <div class="table-wrap">
    <table class="people">
      <thead>
        <tr>
          <th>Name</th>
          <th>Affiliation</th>
          <th>Years</th>
          <th>Project</th>
        </tr>
      </thead>
      <tbody>
        {% for s in group.students %}
          <tr>
            <td>{{ s.name }}</td>
            <td>{{ s.affiliation }}</td>
            <td>{{ s.years }}</td>
            <td>{{ s.project | default: "—" }}</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
{% endfor %}
