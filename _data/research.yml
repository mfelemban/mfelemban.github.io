# Active research projects, rendered as cards on /research/.
# One entry per subfolder of the "Research Projects" folder.
research_projects:
  - title: Federated Learning Security and Privacy
    image: /assets/img/projects/federated-learning-security-privacy.png
    image_alt: Client-edge-cloud federated learning architecture showing data collection, local training, edge and cloud model aggregation
    objective: >-
      Federated learning keeps raw data on client devices, yet the model updates it
      exchanges remain an attack surface. This project studies both sides of that
      surface. On the robustness side, it develops edge-assisted frameworks for early
      detection of label-flipping (data-poisoning) attacks in client-edge-cloud
      architectures, including explainable-AI techniques that combine Grad-CAM with
      clustering to expose malicious client updates, together with mitigation
      strategies that exclude or mask poisoned gradients. On the privacy side, FedGB,
      a generator-based federated learning framework built on conditional GANs, shares
      only the generator with the server to defend against gradient reconstruction
      attacks while maintaining competitive accuracy.
    papers:
      - title: Edge-Assisted Label-Flipping Attack Detection in Federated Learning
        authors: N. S. AlOtaibi, M. Felemban, S. Mahmood
        venue: IEEE Open Journal of the Communications Society
        year: 2024
        url: https://doi.org/10.1109/ojcoms.2024.3496872
      - title: Edge-Based Detection of Label Flipping Attacks in Federated Learning Using Explainable AI
        authors: N. S. AlOtaibi, M. Felemban, S. Mahmood
        venue: IEEE/ACM International Workshop on Software Vulnerability Management (SVM)
        year: 2025
        url: https://doi.org/10.1109/SVM66695.2025.00005
      - title: 'FedGB: A Generator-Based Federated Learning Against Reconstruction Attacks'
        authors: S. Sandouka, M. Felemban
        venue: IEEE Open Journal of the Computer Society
        year: 2026
        url: https://doi.org/10.1109/OJCS.2026.3700901
    students:
      - Nourah AlOtaibi (PhD)
      - Soha Sandouka (PhD)
    collaborators:
      - Sajjad Mahmood

  - title: Federated Learning Applications
    image: /assets/img/projects/federated-learning-applications.png
    image_alt: CEFEEL framework diagram showing on-device training of a personal assistant model and aggregation on a remote server
    objective: >-
      This project brings federated and deep learning to real applications where data
      is sensitive and compute is constrained. CEFEEL, a communication-efficient
      federated learning framework for smartphone personal assistants, freezes model
      parameters that converge early to cut communication and computation without
      sacrificing accuracy. Companion efforts apply the same efficiency lens to other
      domains: light-weight file-fragment classifiers built on depthwise separable
      convolutions enable real-time file carving in digital forensics, and a
      multi-stage learning framework detects both known and novel (zero-day) attacks
      in Internet of Medical Things networks with an explicit reject option for
      unseen behavior.
    papers:
      - title: 'CEFEEL: Communication-Efficient Federated Learning for Personal Assistant Applications'
        authors: A. Sa'ad, M. Felemban, A. Tabbakh
        venue: IEEE Open Journal of the Computer Society
        year: 2025
        url: https://doi.org/10.1109/ojcs.2025.3624806
      - title: A Multi-Stage Learning Framework for Detecting Known and Novel Attacks in the Internet of Medical Things
        authors: R. Alfageer, M. Ghaleb, W. Aljoby, M. Felemban
        venue: IEEE Access
        year: 2026
        url: https://doi.org/10.1109/access.2026.3677553
      - title: File Fragment Type Classification using Light-Weight Convolutional Neural Networks
        authors: M. Felemban, M. Ghaleb, K. Saaim, S. Al-Saleh, A. Almulhem
        venue: IEEE Access
        year: 2024
        url: https://doi.org/10.1109/access.2024.3486180
      - title: Lightweight File Fragments Classification using Depthwise Separable Convolution
        authors: K. Saaim, M. Felemban, S. Al-Saleh, A. Al-Mulhem
        venue: 37th International Conference on ICT Systems Security and Privacy Protection (IFIP SEC)
        year: 2022
        url: https://link.springer.com/chapter/10.1007/978-3-031-06975-8_12
    students:
      - Abdulmumin Sa'ad (MSc)
      - Razan Alfageer (MSc)
      - Kunwar Saaim
    collaborators:
      - Abdulaziz Tabbakh
      - Mustafa Ghaleb
      - Walid Aljoby
      - Saleh Al-Saleh
      - Ahmad Almulhem

  - title: Quantum Algorithms and Applications
    image: /assets/img/projects/quantum-algorithms-applications.png
    image_alt: Variational quantum algorithm loop with a parameterized quantum circuit, measurement apparatus, and classical parameter updates
    objective: >-
      This project investigates what near-term quantum computers can contribute to
      computationally hard, industrially relevant problems. It evaluates variational
      quantum algorithms — the Variational Quantum Eigensolver (VQE) and the Quantum
      Approximate Optimization Algorithm (QAOA) — on combinatorial optimization tasks
      such as the vehicle routing problem, characterizing the practical limits of
      today's NISQ devices against classical optimizers. Building on funded work with
      Saudi Aramco, the group is extending quantum algorithm design and emulation to
      reservoir simulation and seismic-wave modeling.
    papers:
      - title: Variational Quantum Algorithms for Solving Vehicle Routing Problem
        authors: M. Alsaiyari, M. Felemban
        venue: International Conference on Smart Computing and Application (ICSCA)
        year: 2023
        url: https://doi.org/10.1109/ICSCA57840.2023.10087522
    collaborators:
      - Muhammad Alsaiyari (Saudi Aramco)

  - title: Post-Quantum Cryptography
    image: /assets/img/projects/post-quantum-cryptography.png
    image_alt: Updatable encryption illustration showing a ciphertext re-encrypted from an old key to new keys via update tokens without decryption
    objective: >-
      Large-scale quantum computers will break the public-key cryptosystems that
      secure today's communications, so this project designs cryptographic schemes
      that remain secure against quantum adversaries. ISNR-PQC, a lattice-based
      noise-resilient primitive built on the Learning with Errors assumption and
      NIST FIPS 203, derives reliable cryptographic keys from inherently noisy
      sources such as biometric measurements. Companion work studies the homomorphic
      properties of the Kyber and Classic-McEliece KEMs and applies them to
      post-quantum private set intersection, and proposes a lightweight key
      encapsulation mechanism based on the Q-problem, a new quantum-resistant
      hardness assumption. On the key-management side, the project develops an
      unbounded-depth ElGamal-based asymmetric updatable encryption scheme that
      rotates keys without ever decrypting the data, along with an encrypted and
      signed plaintext symmetric cryptosystem that provides confidentiality and
      authenticity in one construction.
    papers:
      - title: 'ISNR-PQC: Isometry Noise Resilience Post Quantum Cryptography Primitive'
        authors: A. A. Al-Saggaf, M. Felemban
        venue: Scientific Reports
        year: 2026
        url: https://doi.org/10.1038/s41598-026-59117-2
      - title: On the Homomorphic Properties of Kyber and McEliece with Application to Post-Quantum Private Set Intersection
        authors: A. A. Abudaqa, K. Alshehri, M. Felemban
        venue: Cryptography
        year: 2025
        url: https://doi.org/10.3390/cryptography9040066
      - title: Lightweight and Efficient Post Quantum Key Encapsulation Mechanism Based on Q-Problem
        authors: M. Kara, K. Karampidis, S. Panagiotakis, M. Hammoudeh, M. Felemban, G. Papadourakis
        venue: Electronics
        year: 2025
        url: https://doi.org/10.3390/electronics14040728
      - title: Unbounded Depth ElGamal-Based Asymmetric Updatable Encryption Technique
        authors: M. Kara, A. Boukrara, M. Hammoudeh, M. Felemban, S. Guediri
        venue: IEEE Open Journal of the Computer Society
        year: 2025
        url: https://doi.org/10.1109/ojcs.2025.3551877
      - title: An Encrypted and Signed Plaintext Symmetric Cryptosystem
        authors: M. Kara, M. Hammoudeh, M. Felemban, K. Karampidis
        venue: Computers and Electrical Engineering
        year: 2025
        url: https://doi.org/10.1016/j.compeleceng.2025.110244
    collaborators:
      - Alawi Al-Saggaf
      - Mostefa Kara
      - Mohammad Hammoudeh
      - Anas Abudaqa
      - Khaled Alshehri
      - Konstantinos Karampidis
      - Spyros Panagiotakis
