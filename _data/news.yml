- date: June 2024
  body: >-
    Our paper titled "Exploring the Human Response to Anger: Uncovering Insights
    through Infrared Thermography and Experimental Psychology" has been accepted
    in Acta Neuropsychologica. This paper is in collaboration with Dr. Tarik
    Abdulrahim from KFUPM, and is an example of the interdisciplinary work that
    we aspire to conduct at IRC-ISS. In this paper, Hassan Al-Saffar (then BSc
    student in EE, KFUPM) explored an interesting idea to study the correlation
    between infrared thermography and psychology. Dr. Tarik set up an experiment
    to provoke the anger emotion through a guided experiment while capturing the
    change of skin temperature using a thermal camera.
    (<a href="https://actaneuropsychologica.com/resources/html/article/details?id=623817&language=en">paper</a>,
    <a href="/files/test.PNG">image</a>)

