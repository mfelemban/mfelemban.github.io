# Latest news. Newest first. Each entry: date + body (HTML allowed).
- date: April 2025
  note: World Quantum Day
  body: >-
    Dr. Muhamad moderated a session titled "Bridging the gap between academia
    and industry: turning research solutions into commercial products" during
    the World Quantum Day 2025 organized by C4IR in The Garage, Riyadh.
    [<a href="https://www.youtube.com/watch?v=f558DvjnsoA&ab_channel=C4IRKSA">Recording</a>]

- date: April 2025
  body: >-
    Dr. Nourah Al-Otaibi successfully defended her PhD thesis titled
    "<strong>Edge-based Detection and Mitigation of Label Flipping Attacks in
    Federated Learning Systems</strong>". It was a long, yet rewarding journey
    for Dr. Nourah. She published 1 journal and 2 A* conference papers. She also
    submitted a promising paper to IEEE TDSC. Best wishes to Dr. Nourah, who is
    the first PhD student to graduate from the SPQ group!

