- date: October 2024
  body: >-
    Our paper titled "File Fragment Type Classification using Light-Weight
    Convolutional Neural Networks" has been accepted for publication in IEEE
    Access. This work started in 2020 by Kunwar Saaim. He worked with me remotely
    when he was a BSc student at Aligarh Muslim University (now MSc student at
    the University of Alberta). Kunwar published a conference paper on the same
    work in IFIP SEC 2022
    (<a href="https://link.springer.com/chapter/10.1007/978-3-031-06975-8_12">paper</a>).
    Later, Dr. Mustafa Ghaleb (Postdoc at IRC-ISS) got involved and proposed two
    more lightweight models for file fragment classification. This work is in
    collaboration with Saleh Al-Saleh (now PhD student at Penn State University)
    while he was a Lecturer in the COE department at KFUPM. Special thanks to
    Dr. Ahmad Al-Mulhem, who proposed this idea and worked closely with the group
    to identify the research gap using his expertise in Digital Forensics.

- date: October 2024
  body: >-
    Our paper titled "Edge-Assisted Label-Flipping Attack Detection in Federated
    Learning", authored by PhD student Nourah Al-Otaibi, has been accepted with
    minor modifications in the IEEE Open Journal of the Communications Society.
    This is the first accepted journal paper from her PhD work. Congratulations,
    Nourah!

- date: July 2024
  body: >-
    Our paper titled "<strong>A Systematic Literature Review on Vulnerabilities,
