- date: March 2022
  body: >-
    Our paper entitled "<strong>File Fragment Classification using Depth-wise
    Separable Convolutions</strong>" has been accepted to
    <strong>IFIP SEC 2022</strong>, Denmark. This paper is a collaboration with
